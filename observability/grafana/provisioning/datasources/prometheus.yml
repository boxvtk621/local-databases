apiVersion: 1

# Старый URL без /prometheus остаётся в sqlite и не обновляется при смене yaml — удаляем и пересоздаём из файла.
deleteDatasources:
  - name: Prometheus
    orgId: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    # Префикс совпадает с --web.external-url в сервисе prometheus (docker-compose).
    url: http://prometheus:9090/prometheus
    isDefault: true
    editable: false
