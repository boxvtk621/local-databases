# Логи контейнеров СУБД (Docker fluentd driver) → Elasticsearch, отдельный префикс на каждый тег db.*
# Пароль: ELASTIC_PASSWORD (compose). Префиксы db-logs-* — не использовать logs-*, иначе сработает встроенный шаблон Elastic (data streams Fleet).

<system>
  log_level info
</system>

<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# Строка log из Docker → при JSON в теле сообщения кладём распарсенный объект в log (в ES: object, не text).
# Один filter на все теги db.* в compose: postgres, mongodb, valkey, qdrant; новый сервис с tag db.* попадёт сюда же.
# Не JSON — событие без изменений (emit_invalid_record_to_error false). Смешанный string/object в одном
# индексе может дать конфликт маппинга: смените logstash_prefix или пересоздайте индекс.
<filter db.**>
  @type parser
  key_name log
  hash_value_field log
  reserve_data true
  emit_invalid_record_to_error false
  <parse>
    @type json
  </parse>
</filter>

<match db.postgres>
  @type elasticsearch
  host elasticsearch
  port 9200
  scheme http
  ssl_verify false
  user elastic
  password "#{ENV['ELASTIC_PASSWORD']}"
  logstash_format true
  logstash_prefix db-logs-postgres
  suppress_type_name true
  <buffer>
    flush_mode interval
    flush_interval 5s
  </buffer>
</match>

